repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check
        language: system
        types_or: [python, pyi]
        exclude: ^strategy_scanner\.py$
      - id: ruff-format
        name: ruff format
        entry: ruff format --check
        language: system
        types_or: [python, pyi]
        exclude: ^strategy_scanner\.py$
      - id: mypy
        name: mypy
        entry: mypy tw_scanner
        language: system
        pass_filenames: false
      - id: gitleaks
        name: gitleaks secret scan
        entry: gitleaks detect --source . --no-git --redact --exit-code 1
        language: system
        pass_filenames: false
