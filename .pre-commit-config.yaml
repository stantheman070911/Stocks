repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check
        language: system
        types_or: [python, pyi]
        exclude: ^strategy_scanner\.py$
      - id: ruff-format
        name: ruff format
        entry: ruff format --check
        language: system
        types_or: [python, pyi]
        exclude: ^strategy_scanner\.py$
      - id: mypy
        name: mypy
        entry: mypy tw_scanner
        language: system
        pass_filenames: false
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
        name: gitleaks secret scan
        pass_filenames: false
