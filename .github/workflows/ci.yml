name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  phase-0:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up Go for managed pre-commit hooks
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock.txt
          python -m pip install -e . --no-deps
      - name: CLI help
        run: tw-scanner --help
      - name: Pre-commit
        run: pre-commit run --all-files
      - name: Lint
        run: ruff check tw_scanner tests
      - name: Type check
        run: mypy tw_scanner
      - name: Tests
        run: pytest
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
