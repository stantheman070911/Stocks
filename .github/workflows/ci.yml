name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  phase-0:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev,validation]"
      - name: CLI help
        run: tw-scanner --help
      - name: Lint
        run: ruff check tw_scanner tests
      - name: Type check
        run: mypy tw_scanner
      - name: Tests
        run: pytest
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

